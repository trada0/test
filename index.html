<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đang chuyển hướng...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            text-align: center;
        }
        .loading {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="loading">Đang xử lý yêu cầu...</div>

    <script>
        (function() {
            // Hàm kiểm tra xem có đang ở trong trình duyệt nội bộ của TikTok không
            function isTikTokInAppBrowser() {
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                // TikTok sử dụng WebView có chứa "BytedanceWebview"
                return /BytedanceWebview/i.test(ua);
            }

            // Đường dẫn đích
            const TIKTOK_TARGET = "https://d2eioyamun8mp1.cloudfront.net/images/1776014079766_h5tcL9h1wx.png";
            const NORMAL_TARGET = "https://s.shopee.vn/8KjFFnwNHZ";

            // Thực hiện chuyển hướng ngay lập tức
            if (isTikTokInAppBrowser()) {
                // Nếu đang ở trong app TikTok -> Chuyển đến ảnh hướng dẫn
                window.location.replace(TIKTOK_TARGET);
            } else {
                // Nếu ở trình duyệt thường -> Chuyển đến link Shopee
                window.location.replace(NORMAL_TARGET);
            }
        })();
    </script>
</body>
</html>
